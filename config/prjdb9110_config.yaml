# PRJDB9110 HT-SELEX run config
# This keeps your default config untouched and points the pipeline at
# the round-by-round counts generated from downloaded FASTQ files.

target:
  input_type: "fasta"
  input_value: "data/sample_targets.fasta"
  name: "prjdb9110_target_context"

library:
  length_min: 15
  length_max: 100
  gc_min: 0.40
  gc_max: 0.75
  max_homopolymer: 4
  min_total_count: 5

selex:
  counts_file: "data/PRJDB9110/prjdb9110_round_counts.csv"
  round_prefix: "round_"

structure:
  temperature: 37.0
  mfe_threshold: -5.0

scoring:
  pseudocount: 1.0
  vectorized_metrics: false
  diversity_kmer_size: 3
  growth_weights:
    fold_change: 0.60
    trend: 0.20
    pace_consistency: 0.20
  weights:
    enrichment_growth: 0.70
    structural_stability: 0.20
    sequence_diversity: 0.10

filtering:
  top_n: 100
  min_complexity: 1
  min_log2_enrichment: 0.0

output:
  format: "both"
  directory: "output/prjdb9110"
  generate_plots: false
  verbose: true
