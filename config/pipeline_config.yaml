# Aptamer Target Identification Pipeline Configuration

target:
  input_type: "fasta"        # Options: pdb_id, fasta, smiles, uniprot
  input_value: "data/sample_targets.fasta"
  name: "vancomycin_target"

library:
  length_min: 15             # Minimum aptamer length (nt)
  length_max: 80             # Maximum aptamer length (nt)
  gc_min: 0.40               # Minimum GC content
  gc_max: 0.75               # Maximum GC content
  max_homopolymer: 4         # Max consecutive identical nucleotides
  min_total_count: 2         # Minimum total read count across rounds

selex:
  counts_file: "data/sample_selex_counts.csv"
  round_prefix: "round_"

structure:
  temperature: 37.0          # Folding temperature in Celsius for optional annotations

scoring:
  pseudocount: 1.0
  vectorized_metrics: false
  diversity_kmer_size: 3
  growth_weights:
    fold_change: 0.80
    trend: 0.15
    terminal_guardrail: 0.05
  weights:
    enrichment_growth: 0.90
    sequence_diversity: 0.10

filtering:
  top_n: 50                  # Number of top candidates to return
  min_log2_enrichment: 0.0   # Optional growth floor for candidates

output:
  format: "csv"              # Options: csv, json, both
  directory: "output"
  generate_plots: false
  verbose: true
